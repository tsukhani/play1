# This is the main configuration file for the application.
# ~~~~~
application.name=%APPLICATION_NAME%
application.version=1.0.0

# Application mode
# ~~~~~
# Set to dev to enable instant reloading and other development help.
# Otherwise set to prod.
application.mode=dev
%prod.application.mode=prod

# Secret key
# ~~~~~
# The secret key is used to secure cryptographic functions.
# Must be loaded from an environment variable — Play refuses to start if a literal
# value is hard-coded here. The default variable name is PLAY_SECRET; you can pick
# any name you like, just keep the `${...}` placeholder form. The value can come
# from a `certs/.env` file (which `play new` and `play secret` write for you),
# an exported shell variable, or a `-D<NAME>=...` JVM flag (system properties
# resolve before env vars).
# Per-environment values come from setting the variable to a different value in
# each environment's `certs/.env` / shell / `-D` flag. Framework-id overrides
# like `%test.application.secret=...` are not permitted: there is one secret
# per app.
application.secret=${PLAY_SECRET}

# i18n
# ~~~~~
# Define locales used by your application.
# You can then place localized messages in conf/messages.{locale} files
# application.langs=fr,en,ja

# Date format
# ~~~~~
date.format=yyyy-MM-dd
# date.format.fr=dd/MM/yyyy

# Server configuration
# ~~~~~
# If you need to change the HTTP port, uncomment this (default is set to 9000)
# http.port=9000
#
# By default the server listen for HTTP on the wildcard address.
# You can restrict this.
# http.address=127.0.0.1
#
# Use this if you don't host your Play application at the root of the domain
# you're serving it from (i.e., behind a reverse proxy that strips a path prefix).
# http.path=/

# Session configuration
# ~~~~~~~~~~~~~~~~~~~~~~
# By default, session will be written to the transient PLAY_SESSION cookie.
# The cookies are not secured by default, only set it to true
# if you're serving your pages through https.
# application.session.cookie=PLAY
# application.session.maxAge=1h
# application.session.secure=false

# SameSite attribute for the session and flash cookies. Defaults to Lax,
# which blocks cross-site navigation cookie sends (the most common CSRF
# vector). Set to Strict for tighter same-site-only behavior, or None
# for cross-site embedding (Secure flag will be enforced automatically
# in that case, per the SameSite spec).
# application.session.sameSite=Lax

# Session/Cookie sharing between subdomain
# ~~~~~~~~~~~~~~~~~~~~~~
# By default a cookie is only valid for a specific domain. By setting
# application.defaultCookieDomain to '.example.com', the cookies
# will be valid for all domains ending with '.example.com', ie:
# foo.example.com and bar.example.com
# application.defaultCookieDomain=.example.com

# JVM configuration
# ~~~~~
# Define which port is used by JPDA when application is in debug mode (default is set to 8000)
# jpda.port=8000
#
# Java source level. Defaults to 25 (matches the minimum runtime).
# Valid values: 25 or higher.
java.source=25

# Log level
# ~~~~~
# Specify log level for your application.
# If you want a very customized log, create a log4j.properties file in the conf directory
# application.log=INFO
#
# More logging configuration
# application.log.path=/log4j.properties
# application.log.system.out=off
#
# Log output format. text (default) uses the classic PatternLayout
# from framework/src/log4j.properties. json switches to ECS-shaped
# JSON suitable for Loki/Datadog/Splunk/Elastic ingestion. Request-
# scoped context (request_id, http_method, http_path, client_ip,
# action_name) appears as MDC fields in JSON mode.
# application.log.format=text

# Database configuration
# ~~~~~ 
# Enable a database engine if needed.
#
# To quickly set up a development database, use either:
#   - mem : for a transient in memory database (H2 in memory)
#   - fs  : for a simple file written database (H2 file stored)
# db.default=mem
#
# To connect to a local MySQL5 database, use:
# db.default=mysql://user:pwd@host/database
#
# To connect to a local PostgreSQL9 database, use:
# db=postgres://user:pwd@host/database
#
# If you need a full JDBC configuration use the following :
# db.default.url=jdbc:postgresql:database_name
# db.default.driver=org.postgresql.Driver
# db.default.user=root
# db.default.pass=secret
#
# Connections pool configuration :
# db.default.pool.timeout=1000
# db.default.pool.maxSize=30
# db.default.pool.minSize=10
#
# If you want to reuse an existing Datasource from your application server, use:
# db.default=java:/comp/env/jdbc/myDatasource
#
# When using an existing Datasource, it's sometimes needed to destroy it when
# the application is stopped. Depending on the datasource, you can define a
# generic "destroy" method :
# db.default.destroyMethod=close

# # database isolation configuration
# # Valid values are NONE, READ_UNCOMMITTED, READ_COMMITTED, REPEATABLE_READ, SERIALIZABLE,
# # or an integer value to be passed to java.sql.Connection.setTransactionIsolation().
# # Note that not all databases support all transaction isolation levels.
# # Default: database dependent, usually READ_COMMITTED
# db.default.isolation=SERIALIZABLE

# JPA Configuration (Hibernate)
# ~~~~~
#
# Specify the custom JPA dialect to use here (default to guess):
# jpa.default.dialect=org.hibernate.dialect.PostgreSQLDialect
#
# Specify the ddl generation pattern to use. Set to none to disable it 
# (default to update in DEV mode, and none in PROD mode):
# jpa.default.ddl=update
#
# Debug SQL statements (logged using DEBUG level):
# jpa.default.debugSQL=true
#
# You can even specify additional hibernate properties here:
# hibernate.default.use_sql_comments=true
# ...
# org.hibernate.default.flushMode
# jakarta.persistence.default.flushMode
#

# Store path for Blob content
attachments.path=data/attachments

# Memcached configuration
# ~~~~~ 
# Enable memcached if needed. Otherwise a local cache is used.
# memcached=enabled
#
# Specify memcached host (default to 127.0.0.1:11211)
# memcached.host=127.0.0.1:11211
#
# Or you can specify multiple host to build a distributed cache
# memcached.1.host=127.0.0.1:11211
# memcached.2.host=127.0.0.1:11212
#
# Use plain SASL to authenticate for memcached
# memcached.user=
# memcached.password=

# HTTP Response headers control for static files
# ~~~~~
# Set the default max-age, telling the user's browser how long it should cache the page.
# Default is 3600 (one hour). Set it to 0 to send no-cache.
# This is only read in prod mode, in dev mode the cache is disabled.
# http.cacheControl=3600

# If enabled, Play will generate entity tags automatically and send a 304 when needed.
# Default is true, set it to false to deactivate use of entity tags.
# http.useETag=true

# Health check endpoints (PF-11)
# ~~~~~
# /@health/live  always returns 200 with {"status":"UP"} when the JVM is running.
# /@health/ready aggregates registered HealthCheck implementations; returns 200 if
# all checks UP, 503 if any DOWN.
# health.basePath=/@health
# health.authToken=  (set to require Authorization: Bearer <token>; empty disables)

# Custom mime types
# mimetype.xpi=application/x-xpinstall

# WS configuration
# ~~~~~
# Default engine is Async Http Client, uncomment to use
# the JDK's internal implementation
# webservice = urlfetch
# If you need to set proxy params for WS requests
# http.proxyHost = localhost
# http.proxyPort = 3128
# http.proxyUser = jojo
# http.proxyPassword = jojo

# Mail configuration
# ~~~~~ 
# Default is to use a mock Mailer
mail.smtp=mock

# Or, specify mail host configuration
# mail.smtp.host=127.0.0.1
# mail.smtp.user=admin
# mail.smtp.pass=
# mail.smtp.channel=ssl

# Url-resolving in Jobs
# ~~~~~~
# When rendering templates with reverse-url-resoling (@@{..}) in Jobs (which do not have an inbound Http.Request),
# ie if sending a HtmlMail, Play need to know which url your users use when accessing your app.
# %test.application.baseUrl=http://localhost:9000/
# %prod.application.baseUrl=http://www.yourdomain.com/

# Templates additional precompilation
# ~~~~~~
# yaml files can use template expressions and are located in the conf folder.
# The default precompile task will not pickup those files.
# You can manually add some files with the following property
# (default: system property play.templates.compile, fallback system environment PLAY_TEMPLATES_COMPILE)
# play.templates.compile=conf/initialdata.yml;{module:reporting}test/reporting/unittests/export.yml
#
# Override the path separator if you want to use the Play!-module notation like {module:modname} on unix.
# (default: system property path.separator)
# play.templates.compile.path.separator=;

# Netty pipeline configuration (advanced settings)
# You can default netty settings by overriding the following line. Each handler must be comma separated.
# The last value must be the PlayHandler class (or your own that extends PlayHandler)
# Default values are (Netty 4)
# play.netty.pipeline = io.netty.handler.codec.http.HttpRequestDecoder,play.server.StreamChunkAggregator,io.netty.handler.codec.http.HttpResponseEncoder,io.netty.handler.stream.ChunkedWriteHandler,play.server.PlayHandler
# For example, to enable Netty response compression
# play.netty.pipeline = io.netty.handler.codec.http.HttpRequestDecoder,play.server.StreamChunkAggregator,io.netty.handler.codec.http.HttpResponseEncoder,io.netty.handler.codec.http.HttpContentCompressor,io.netty.handler.stream.ChunkedWriteHandler,play.server.PlayHandler
# For SSL, use the play.ssl.netty.pipeline property
# play.ssl.netty.pipeline = io.netty.handler.codec.http.HttpRequestDecoder,play.server.StreamChunkAggregator,io.netty.handler.codec.http.HttpResponseEncoder,io.netty.handler.codec.http.HttpContentCompressor,io.netty.handler.stream.ChunkedWriteHandler,play.server.ssl.SslPlayHandler
#
# StreamChunkAggregator behaviour:
#   play.netty.spoolThresholdBytes — bodies above this threshold are spooled to a temp file
#                                    (default 1048576 / 1 MB). Bodies under it stay in memory.
#   play.netty.maxContentLength    — hard cap; requests above this return 413. -1 (default) = unlimited.
#
# EventLoop sizing:
#   play.netty.maxThreads — worker NioEventLoopGroup thread count. Unset / 0 / blank = Netty
#                           default (2 × cores). Boss group is always 1 thread per bound port.
#
# WebSocket:
#   play.netty.ws.allowExtensions — advertise support for permessage-deflate during the WS
#                                   handshake (default false). Enable for chatty WS apps to
#                                   opt into transparent frame compression.
#
# HttpContentCompressor tuning (only applies when HttpContentCompressor is in play.netty.pipeline):
#   play.netty.compression.contentSizeThreshold — skip compression for responses smaller than
#                                                  this many bytes (default 0 = always try).
#                                                  Useful to avoid the gzip-overhead-on-tiny-
#                                                  payload pattern (e.g., 71 → 88 B JSON).
#   play.netty.compression.gzip.level    — zlib level 1–9 (default 6). Higher = better ratio,
#                                          more CPU.
#   play.netty.compression.deflate.level — same as above for raw deflate (default 6).
#   play.netty.compression.brotli.quality — Brotli quality 0–11 (default 4). q=0–4 fast,
#                                            q=6–8 typical sweet spot for runtime, q=11 is
#                                            offline-only (often 50× slower).
# Out-of-range values are clamped to the supported range and logged at WARN.

# # X509 certificates (PEM)
# # The play enable-https command generates these automatically via mkcert (preferred,
# # produces a system-trusted cert) or openssl (fallback, self-signed). Both helpers
# # produce unencrypted keys, so certificate.key.password can be left unset for the
# # default local-dev workflow. To use a custom path, set the values here BEFORE
# # running play enable-https and the command will honor your settings.
# certificate.file=certs/host.cert
# certificate.key.file=certs/host.key
# # If the private key is passphrase-encrypted (typical production hardening), set
# # the password — read it from the environment rather than committing the literal:
# # certificate.key.password=${CERT_KEY_PASSWORD}

# OpenAPI spec generation (PF-12)
# ~~~~~
# /@api/openapi.json and /@api/openapi.yaml expose an OpenAPI 3 spec generated
# from your routes file and controller method signatures. /@api/docs serves
# Swagger UI loaded from unpkg.com — dev mode only.
# openapi.enabled=true
# openapi.basePath=/@api

# Open file from errors pages
# ~~~~~
# If your text editor supports opening files by URL, Play! will
# dynamically link error pages to files
#
# Example, for textmate:
# play.editor=txmt://open?url=file://%s&line=%s

# Metrics (PF-13)
# ~~~~~
# /@metrics returns Prometheus exposition format. JVM and HTTP request
# metrics are auto-registered. Custom metrics: play.libs.Metrics.counter(...)
# and friends.
# metrics.enabled=true
# metrics.basePath=/@metrics

# Testing. Set up a custom configuration for test mode
# ~~~~~
#%test.module.cobertura=${play.path}/modules/cobertura
%test.application.mode=dev
%test.db.url=jdbc:h2:mem:play;MODE=MYSQL;LOCK_MODE=0
%test.jpa.ddl=create
%test.mail.smtp=mock

