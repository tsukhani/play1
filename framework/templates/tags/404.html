%{
	result = _arg ?: _result
}%

<div id="header" class="p-5 border-b border-gray-400 bg-yellow-100">
    <h1 class="font-normal text-2xl m-0">
        Not found
    </h1>
    <p class="text-gray-800">
        ${result.message}
    </p>
</div>
<div id="routes" class="p-5 border-b border-gray-400 bg-gray-100">
    <h2 class="font-normal text-lg m-0 mb-2.5">These routes have been tried, in this order :</h2>
    <ol>
        #{list items:play.mvc.Router.routes, as:'route'}
            <li class="text-sm font-mono text-gray-800">${route.method.pad(10).raw()}${(route.host + route.path).pad(50).raw()}${route.action} <!-- ${route.hostPattern}${route.pattern} to ${route.actionPattern} --></li>
        #{/list}
    </ol>
</div>
