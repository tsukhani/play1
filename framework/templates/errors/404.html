<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Not found</title>
        <meta http-equiv="Content-Type" content="text/html; charset=${_response_encoding}"/>
        <link rel="stylesheet" href="@{'/public/stylesheets/play-tailwind.css'}"/>
    </head>
    <body class="m-0 p-0 font-sans bg-gray-200">
    	#{if play.mode.name() == 'DEV'}
                #{404 result /}
    	#{/if}
        #{else}
            <h1>Not found</h1>
            <p>
                ${result.message}
            </p>
        #{/else}
    </body>
</html>
