application.name=IntegrationTestApp
application.mode=dev
application.secret=${PLAY_SECRET}

%test.application.mode=dev
%test.db=mem
%test.jpa.ddl=create-drop

# PF-58 / PF-68 / PF-69: HTTP/2 + HTTP/3 functional test config. Activated only
# when the test bootstraps a real Netty Server alongside Play.start(); the in-
# process FunctionalTest path used by RequestLifecycleTest never reads these. The
# PEM cert is openssl-generated, self-signed RSA-2048 with CN=localhost and
# SAN=DNS:localhost,IP:127.0.0.1,IP:::1, valid 10 years from generation. PF-68
# dropped the JKS branch — PEM is the only supported cert source now. PF-69 moved
# the canonical PEM location from conf/ to certs/ so dev mode, Docker compose,
# and the jclaw cert helper share one path.
%test.https.port=19443
%test.https.address=127.0.0.1
%test.certificate.file=certs/host.cert
%test.certificate.key.file=certs/host.key

# PF-57: HTTP/3 activates implicitly when https.port is set (no separate flag).
# UDP port 19443 does NOT collide with TCP 19443 PF-58 binds — UDP and TCP have
# separate port spaces. The Alt-Svc header on every TLS-protected response
# advertises the same UDP port, which Http2FunctionalTest asserts to verify the
# h2-advertises-h3 cascade works.
