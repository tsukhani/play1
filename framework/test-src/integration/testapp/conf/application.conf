application.name=IntegrationTestApp
application.mode=dev
application.secret=${PLAY_SECRET}

%test.application.mode=dev
%test.db=mem
%test.jpa.ddl=create-drop

# PF-58: HTTP/2 functional test config. Activated only when the test bootstraps a
# real Netty Server alongside Play.start(); the in-process FunctionalTest path used
# by RequestLifecycleTest never reads these. The JKS keystore is keytool-generated,
# self-signed RSA-2048 with CN=localhost and SAN=DNS:localhost,IP:127.0.0.1, valid
# 10 years from generation. Exercising the JKS path here proves the h2 SSL builder
# handles both keystore and PEM cert sources (PEM path uses the same Netty
# SslContextBuilder API and is left to user-side validation).
%test.https.port=19443
%test.keystore.file=conf/test-keystore.jks
%test.keystore.password=secret
%test.play.http2.enabled=true
