# Mirrors framework/src/log4j.properties but emits ECS-shaped JSON via
# JsonTemplateLayout (log4j-layout-template-json). Selected by setting
# application.log.format=json. EcsLayout.json ships inside the layout jar;
# the classpath: scheme resolves it from there.
appender.console.type = Console
appender.console.name = ConsoleName
appender.console.layout.type = JsonTemplateLayout
appender.console.layout.eventTemplateUri = classpath:EcsLayout.json
appender.console.filter.threshold.type = ThresholdFilter
appender.console.filter.threshold.level = INFO
# play logger
logger.play.name = play
logger.play.level = INFO
logger.quartz.name = org.quartz
logger.quartz.level = WARN
logger.hibernate.name = org.hibernate
logger.hibernate.level = WARN
logger.datanucleus.name = DataNucleus
logger.datanucleus.level = WARN
logger.httpclient.name = org.apache.commons.httpclient
logger.httpclient.level = ERROR
logger.oval.name = net.sf.oval.internal
logger.oval.level = ERROR
logger.springframework.name = org.springframework
logger.springframework.level = WARN

# root logger
rootLogger.level = INFO
rootLogger.appenderRef.console.ref = ConsoleName
