<!DOCTYPE html>

<html lang="${lang}">
    <head>
        <title>#{get 'title' /}</title>
        <meta charset="${_response_encoding}" />
        <link rel="stylesheet" media="screen" href="@{'/public/stylesheets/play-tailwind.css'}" />
    </head>
    <body class="m-0 p-0 font-sans text-sm text-gray-900">

        <div class="bg-gray-900 px-5 py-2.5">
            <h1 class="m-0 font-normal"><a class="text-yellow-400 no-underline" href="@{CRUD.index()}">&{'crud.title'}</a></h1>
        </div>

#{if request.actionMethod != 'index'}
            <div class="px-5 py-1.5 text-xs border-b border-gray-300">
                #{crud.navigation /}
            </div>
#{/if}

#{if flash.success}
            <div class="px-5 py-1.5 border-b border-gray-300 text-white bg-success">
                ${flash.success}
            </div>
#{/if}
#{if flash.error || error}
            <div class="px-5 py-1.5 border-b border-gray-300 text-white bg-error">
                ${error ?: flash.error}
            </div>
#{/if}

        <div class="px-5 py-2.5">
#{doLayout /}
        </div>

        <div class="text-xs text-gray-400 px-5 py-2.5 border-t border-dashed border-gray-300 border-b mt-5">
            Generated by the Play CRUD module. <a class="text-gray-700" href="https://www.playframework.com/documentation/1.1/crud">Learn how to customize it !</a>
        </div>

    </body>
</html>
