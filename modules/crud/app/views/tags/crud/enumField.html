#{field 'object.' + _name}
<label class="block font-bold w-1/5 float-left text-gray-500 cursor-pointer" for="${field.id}">
    &{_name}
</label>

<select class="font-sans text-xs" id="${field.id}" name="${field.name}">
        %{ _property.choices.each() { }%
        %{
                selected = false;
                if(field.error?.message != 'validation.required') {
                    selected = it == _value;
                }
                label = it.toString()

        }%
        <option name="${it.name()}" ord="${it.ordinal()}" value="${it.name()}" ${selected ? 'selected="true"'.raw() : ''}>${label}</option>
        %{ } }%
</select>

#{ifError field.name}
    <span class="text-error pl-2.5 absolute top-4 text-xs">${field.error.raw()}</span>
#{/ifError}
#{/field}
