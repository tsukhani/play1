#{field 'object.' + _name}
    <label class="block font-bold w-1/5 float-left text-gray-500 cursor-pointer" for="${field.id}">
        &{_name}
    </label>
    <input id="${field.id}" class="${field.errorClass}" type="checkbox" name="${field.name}" value="true" ${(params[field.name] ? params.getAll(field.name)[0] == 'true' : _value) ? 'checked="true"'.raw() : ''} />
    <input type="hidden" name="${field.name}" value="false" />
    #{ifError field.name}
        <span class="text-error pl-2.5 absolute top-4 text-xs">${field.error.raw()}</span>
    #{/ifError}
#{/field}
