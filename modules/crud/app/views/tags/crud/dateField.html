#{field 'object.' + _name}
    <label class="block font-bold w-1/5 float-left text-gray-500 cursor-pointer" for="${field.id}">
        &{_name}
    </label>
    <input id="${field.id}" class="font-sans text-xs ${field.errorClass}" type="text" name="${field.name}" value="${_value?.format()}" size="10" />
    #{ifError field.name}
        <span class="text-error pl-2.5 absolute top-4 text-xs">${field.error.raw()}</span>
    #{/ifError}
#{/field}
